# ADLS Gen2 Lite Emulator -- CI pipeline
#
# Security hardening for production: replace version tags with pinned SHAs:
#   actions/checkout@v4  -> @11bd71901bbe5b1630ceea73d27597364c9af683 (v4.2.2)
#   actions/setup-python@v5 -> @0acd7b6d4b50e66430ac7b4e6abee7e7c64f7c52 (v5.3.0)
#   actions/cache@v4     -> @1bd1e32a3bdc45362d1e726936510720a7c6158d (v4.2.0)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: fast in-process unit + API tests (no Docker required)
  # ---------------------------------------------------------------------------
  test:
    name: pytest (unit + API)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install runtime + test dependencies
        run: |
          pip install \
            "fastapi==0.136.1" \
            "uvicorn[standard]==0.46.0" \
            "pytest>=8.3.0" \
            "httpx>=0.27.0" \
            "azure-storage-file-datalake==12.23.0"

      - name: Compile check
        run: python3 -m compileall src tests

      - name: pytest
        run: python3 -m pytest -q

  # ---------------------------------------------------------------------------
  # Job 2: Docker build + container health + SDK smoke (requires Docker daemon)
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: Docker build + health + SDK smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build

      - name: Start emulator
        run: docker compose up -d

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:10004/health >/dev/null 2>&1; then
              echo "Emulator ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:10004/health

      - name: Install SDK for smoke test
        run: pip install "azure-storage-file-datalake==12.23.0" "pytest>=8.3.0"

      - name: SDK smoke test
        run: python3 examples/python_sdk_smoke.py

      - name: SDK pytest smoke tests (live)
        run: python3 -m pytest -q tests/test_sdk_smoke.py

      - name: Stop emulator
        if: always()
        run: docker compose down -v
